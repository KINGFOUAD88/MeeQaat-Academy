<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meeqaat | Coming Soon</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
        "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      text-align: center;
      padding: 20px;
    }

    /* Circle icon */
    .icon {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #fff;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    /* Main title */
    h1 {
      font-size: clamp(60px, 8vw, 110px);
      font-weight: 700; /* Bold */
      letter-spacing: -2px;
      margin-bottom: 40px;
    }

    /* Button */
    .next-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-width: 200px;
      height: 65px;
      border-radius: 18px;
      background: #2f74d8;
      color: #fff;
      text-decoration: none;
      font-size: 22px;
      transition: 0.2s ease;
      box-shadow: 0 10px 30px rgba(47, 116, 216, 0.3);
    }

    .next-btn:hover {
      transform: translateY(-2px);
      background: #3b82f6;
    }

    /* Bottom text */
    .footer {
      position: absolute;
      bottom: 30px;
      left: 30px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.7);
      font-size: 16px;
    }

    .footer-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      box-shadow: 0 0 12px rgba(0,114,255,0.6);
    }

    /* Search style (just aesthetic) */
    .search-box {
      position: absolute;
      right: 30px;
      bottom: 25px;
      width: 220px;
      height: 45px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .footer,
      .search-box {
        display: none;
      }

      h1 {
        font-size: 50px;
      }

      .next-btn {
        height: 55px;
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <main class="page">

    <div class="icon">✓</div>

    <h1>Coming soon!</h1>

    <a class="next-btn" href="platform.html">
      <span>Next</span>
      <span>→</span>
    </a>

    <div class="footer">
      <span class="footer-dot"></span>
      <span>
        Meeqaat — master Arabic, Quran & Islamic studies with clarity
      </span>
    </div>

    <div class="search-box">
      Meeqaat experience
    </div>

  </main>

</body>
</html>
